name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: hanzo-build-linux-amd64
            platform: linux/amd64
            suffix: amd64
          - runner: hanzo-build-linux-arm64
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/hanzoai/world
          flavor: suffix=-${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=build-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.suffix }}
          provenance: false

  # Merge per-arch images into multi-arch manifest
  manifest:
    needs: build
    if: ${{ !cancelled() && contains(needs.build.result, 'success') }}
    runs-on: hanzo-build-linux-amd64
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/hanzoai/world
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Create multi-arch manifests
        run: |
          readarray -t TAGS <<< "${{ steps.meta.outputs.tags }}"
          for TAG in "${TAGS[@]}"; do
            [ -z "$TAG" ] && continue
            SOURCES=""
            for SUFFIX in amd64 arm64; do
              if docker buildx imagetools inspect "${TAG}-${SUFFIX}" >/dev/null 2>&1; then
                SOURCES="$SOURCES ${TAG}-${SUFFIX}"
              fi
            done
            if [ -n "$SOURCES" ]; then
              echo "Creating manifest: $TAG from$SOURCES"
              docker buildx imagetools create --tag "$TAG" $SOURCES
            fi
          done
