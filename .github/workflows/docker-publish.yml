name: Docker

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/world
      dockerfile: docker/Dockerfile
      # Canonical native arcd labels — matches spark for arm64.
      runner-arm64: '["self-hosted","linux","arm64"]'
    secrets: inherit
