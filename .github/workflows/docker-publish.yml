name: Docker

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/world
      dockerfile: docker/Dockerfile
      # Spark Ampere is the canonical online arm64 hanzoai runner;
      # the legacy spark-hanzoai-arm64 default has zero advertised
      # runners after the arcd relabel. Pin to spark-hanzo.
      runner-arm64: spark-hanzo
    secrets: inherit
