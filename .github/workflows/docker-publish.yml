name: Docker

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/world
      dockerfile: docker/Dockerfile
    secrets: inherit
